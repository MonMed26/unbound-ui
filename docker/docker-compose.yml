version: '3.8'

services:
  unbound-ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: unbound-ui
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:8080"
    volumes:
      - unbound-config:/etc/unbound
      - unbound-ui-data:/var/lib/unbound-ui
      - ./config.yaml:/etc/unbound-ui/config.yaml
    environment:
      - TZ=Asia/Jakarta
    cap_add:
      - NET_BIND_SERVICE
    networks:
      - dns-net

networks:
  dns-net:
    driver: bridge

volumes:
  unbound-config:
  unbound-ui-data:
